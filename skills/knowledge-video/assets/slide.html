<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root {
  --bg: radial-gradient(ellipse at 50% 25%, #111827, #0a0e1a 40%, #08080f 70%, #050508);
  --text: #f0f0f5;
  --muted: rgba(240,240,245,0.40);
  --accent: #3B82F6;
  --accent-glow: rgba(59,130,246,0.30);
  --accent-bg: rgba(59,130,246,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei','Hiragino Sans GB',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
body { background: var(--bg); width: 1920px; height: 1080px; overflow:hidden; position:relative; }
.bg-orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none}
.wrap { position:relative; z-index:1; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:60px 100px 100px; }
.top-badge { display:inline-flex; align-items:center; gap:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:24px; padding:10px 24px; font-size:20px; color:rgba(240,240,245,0.50); font-weight:500; letter-spacing:0.3px; margin-bottom:44px; }
.top-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; background:var(--accent); box-shadow:0 0 10px var(--accent-glow); }
.title { font-size:82px; font-weight:800; color:var(--text); line-height:1.12; letter-spacing:-0.8px; max-width:1500px; }
.sub { font-size:38px; color:rgba(240,240,245,0.55); font-weight:500; line-height:1.50; max-width:1300px; margin-top:20px; }
.sub .hl { color:var(--accent); font-weight:700; }
.kp-row { display:flex; align-items:center; gap:32px; margin-top:44px; flex-wrap:wrap; justify-content:center; }
.kp-tag { display:flex; align-items:center; gap:10px; font-size:22px; color:rgba(240,240,245,0.55); font-weight:500; white-space:nowrap; }
.kp-dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
.narr { position:absolute; bottom:60px; left:100px; right:160px; text-align:left; font-size:28px; color:var(--accent); font-weight:700; line-height:1.55; }
.page-num { position:absolute; bottom:44px; right:56px; font-size:22px; color:rgba(255,255,255,0.20); font-weight:500; font-variant-numeric:tabular-nums; letter-spacing:0.5px; }
</style>
</head>
<body>
  <div class="bg-orb" style="width:900px;height:900px;background:var(--accent-bg);top:-300px;left:-200px;opacity:0.45"></div>
  <div class="bg-orb" style="width:550px;height:550px;background:var(--accent-bg);bottom:-200px;right:-120px;opacity:0.28"></div>
  <div class="wrap">
    <div class="top-badge">
      <span class="top-dot"></span>Knowledge Briefing
    </div>
    <div class="title" id="title">标题</div>
    <div class="sub" id="subtitle">副标题 · <span class="hl">高亮文字</span></div>
    <div class="kp-row" id="tags">
      <div class="kp-tag"><span class="kp-dot" style="background:#a78bfa"></span>标签一</div>
      <div class="kp-tag"><span class="kp-dot" style="background:#34d399"></span>标签二</div>
      <div class="kp-tag"><span class="kp-dot" style="background:#60a5fa"></span>标签三</div>
    </div>
  </div>
  <div class="narr" id="notes">讲稿旁白文字</div>
  <div class="page-num" id="footer">01 / 04</div>
</body>
</html>
